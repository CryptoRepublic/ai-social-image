<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Image Generator - Powered by Pollinations.ai</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- Auth Modal -->
    <div id="auth-modal" class="modal hidden">
        <div class="modal-content">
            <h2>🔑 Pollinations Login</h2>
            <p>Enter your API Token from <a href="https://enter.pollinations.ai" target="_blank">enter.pollinations.ai</a> to unlock higher limits.</p>
            <input type="text" id="api-key-input" placeholder="Paste your Bearer Token here..." />
            <div class="modal-actions">
                <button id="save-key-btn" class="btn-success">Save Token</button>
                <button id="clear-key-btn" class="btn-warning hidden">Logout</button>
                <button id="close-modal-btn" class="btn-outline">Cancel</button>
            </div>
        </div>
    </div>

    <div class="container">
        <header>
            <div class="header-top">
                <h1>✨ AI Image Generator</h1>
                <button id="auth-btn" class="btn-outline auth-btn">Login / API Key</button>
            </div>
            <p>Type a prompt and generate your image directly from your browser.</p>
        </header>

        <main>
            <div class="input-group">
                <label for="prompt">Your Prompt:</label>
                <textarea id="prompt" rows="3" placeholder="A futuristic city with flying cars at sunset..."></textarea>
            </div>

            <div class="input-group">
                <label for="format">Choose format:</label>
                <select id="format">
                    <option value="1080x1080">Square (1080x1080)</option>
                    <option value="1920x1080">Landscape (1920x1080)</option>
                    <option value="1080x1920">Portrait / Stories (1080x1920)</option>
                </select>
            </div>

            <!-- Advanced Options -->
            <details class="advanced-options">
                <summary>⚙️ Advanced Options</summary>
                <div class="options-grid">
                    <div class="input-group">
                        <label for="model">Model:</label>
                        <select id="model">
                            <option value="flux">Flux (Default & Best)</option>
                            <option value="turbo">Turbo (Fast)</option>
                            <option value="flux-realism">Flux Realism</option>
                            <option value="any-dark">Any Dark</option>
                        </select>
                    </div>
                    <div class="input-group">
                        <label for="seed">Seed (Optional):</label>
                        <input type="number" id="seed" placeholder="Leave blank for random">
                    </div>
                    <div class="checkbox-group">
                        <input type="checkbox" id="enhance">
                        <label for="enhance">Enhance Prompt (AI expands your idea)</label>
                    </div>
                </div>
            </details>

            <button id="generate-btn">Generate Image 🚀</button>

            <div class="result-section">
                <div id="loader" class="hidden">Generating... please wait! ⏳</div>
                <img id="result-img" class="hidden" alt="Generated AI Image" crossorigin="anonymous" />
                
                <div id="action-buttons" class="action-buttons hidden">
                    <button id="download-btn" class="btn-success">Download 📥</button>
                    <button id="regenerate-btn" class="btn-warning">Regenerate 🔄</button>
                </div>
            </div>
        </main>
    </div>

    <script src="app.js"></script>
</body>
</html>
